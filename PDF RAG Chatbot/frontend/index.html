<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF RAG Chatbot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-card">
        <div>
          <p class="eyebrow">FastAPI + FAISS + Ollama</p>
          <h1>PDF RAG Chatbot</h1>
          <p class="subtitle">
            Upload a PDF and ask questions grounded in the document content.
          </p>
        </div>
      </header>

      <main class="layout-grid">
        <section class="panel upload-panel">
          <div class="panel-header">
            <h2>Upload PDF</h2>
            <span class="status-pill" id="uploadStatus">Ready</span>
          </div>

          <label class="dropzone" id="dropzone" for="pdfInput">
            <input id="pdfInput" type="file" accept="application/pdf" hidden />
            <div class="dropzone-content">
              <div class="dropzone-icon">📄</div>
              <p><strong>Drag & drop</strong> your PDF here</p>
              <p>or click to browse</p>
            </div>
          </label>

          <div class="actions-row">
            <button id="uploadButton" class="primary-btn">Upload PDF</button>
            <button id="clearFileButton" class="secondary-btn">Clear</button>
          </div>

          <div id="uploadProgress" class="progress-bar" hidden>
            <div class="progress-fill"></div>
          </div>

          <div id="uploadMessage" class="message-box" hidden></div>
          <div id="uploadedFileName" class="file-name"></div>
        </section>

        <section class="panel chat-panel">
          <div class="panel-header">
            <h2>Ask Questions</h2>
            <button id="clearChatButton" class="secondary-btn">Clear Chat</button>
          </div>

          <div id="chatWindow" class="chat-window"></div>

          <div class="composer">
            <textarea
              id="questionInput"
              rows="3"
              placeholder="Ask a question about the uploaded PDF..."
            ></textarea>
            <div class="composer-actions">
              <button id="askButton" class="primary-btn">Ask</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
